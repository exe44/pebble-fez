<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FEZ Settings</title>
    <style>__EMULATOR_CONFIG_CSS__</style>
  </head>
  <body>
    <div class="wrap">
      <h1>FEZ Settings</h1>
      <p>Adjust animation and colors.</p>

      <div class="card">
        <label class="toggle">
          <input id="slow" type="checkbox">
          <span>Slow animation</span>
        </label>
      </div>

      <div class="card">
        <label for="bg">Background color</label>
        <div id="bg-palette" class="palette"></div>
      </div>

      <div id="face-card" class="card">
        <label for="face">Face color</label>
        <div id="face-palette" class="palette"></div>
        <div class="hint">Digit fill color.</div>
        <div id="face-mix-row">
          <label class="toggle">
            <input id="face-mix" type="checkbox">
            <span>Face mix with background</span>
          </label>
        </div>
      </div>

      <div id="line-card" class="card">
        <label for="line">Line color</label>
        <div id="line-palette" class="palette"></div>
        <div class="hint">Used for all lines when split is off.</div>
        <div id="line-mix-row">
          <label class="toggle">
            <input id="line-mix" type="checkbox">
            <span>Line mix with background</span>
          </label>
        </div>
        <div id="split-line-row">
          <label class="toggle">
            <input id="split-line-colors" type="checkbox">
            <span>Split line colors</span>
          </label>
          <div class="hint">Enable separate back and side colors.</div>
        </div>
        <div id="back-line-card">
          <label for="back-line">Back line color</label>
          <div id="back-line-palette" class="palette"></div>
        </div>
        <div id="side-line-card">
          <label for="side-line">Side line color</label>
          <div id="side-line-palette" class="palette"></div>
        </div>
      </div>

      <div id="randomize-card" class="card">
        <label>Randomize</label>
        <label class="toggle">
          <input id="randomize-bg" type="checkbox">
          <span>Background</span>
        </label>
        <label class="toggle">
          <input id="randomize-face" type="checkbox">
          <span>Face</span>
        </label>
        <label class="toggle">
          <input id="randomize-line" type="checkbox">
          <span>Line</span>
        </label>
        <div class="hint">Choose which colors to randomize.</div>
        <button id="randomize-colors" type="button">Randomize colors</button>
        <div class="hint">Colors apply after you save.</div>
      </div>

      <button id="save" type="button">Save</button>
    </div>

    <script>__EMULATOR_CONFIG_JS__</script>
  </body>
</html>
